<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Cozy Uploader 기본 로고 (임시 / 개선 전용) -->
  <defs>
    <!-- 배경 그라데이션 -->
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#2a1f4e"/>
      <stop offset="100%" stop-color="#0f1115"/>
    </radialGradient>
    <!-- 악센트 그라데이션 -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <!-- 부드러운 그림자 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- 배경 원형 -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- 장식 - 달/아치 -->
  <circle cx="380" cy="140" r="40" fill="#c084fc" opacity="0.25" filter="url(#glow)"/>
  <circle cx="380" cy="140" r="28" fill="#e8d5ff" opacity="0.7"/>

  <!-- 중앙 아이콘: 음표 + 업로드 화살표 -->
  <g transform="translate(256, 280)">
    <!-- 음표 머리 -->
    <ellipse cx="-50" cy="50" rx="42" ry="34" fill="url(#accent)" transform="rotate(-18)"/>
    <!-- 음표 줄기 -->
    <rect x="-8" y="-80" width="14" height="130" fill="url(#accent)" rx="3"/>
    <!-- 음표 깃발 -->
    <path d="M 6 -80 Q 80 -60, 60 -10 Q 80 -30, 6 -40 Z" fill="url(#accent)"/>
  </g>

  <!-- 업로드 상승 화살표 (음표 아래) -->
  <g transform="translate(256, 420)">
    <path d="M -22 0 L 22 0 L 22 -18 L 42 -18 L 0 -50 L -42 -18 L -22 -18 Z"
          fill="#c084fc" opacity="0.85"/>
  </g>

  <!-- 텍스트 "C" (워드마크 역할) - 모서리 미니 -->
  <text x="98" y="160" font-family="Georgia, serif" font-size="90"
        font-weight="700" fill="#e8eaed" opacity="0.15">C</text>
</svg>
